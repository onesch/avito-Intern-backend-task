version: "3.12"

services:
  db:
      image: postgres:16
      environment:
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
        interval: 5s
        retries: 5
      ports:
        - "5433:5432"

  web:
    build: .
    command: >
      sh -c "
      uv run uvicorn app.main:app --host 0.0.0.0 --port 9000
      "
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    environment:
      DB_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
